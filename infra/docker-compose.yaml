version: "3.9"

services:
  db:
    image: postgres:15
    container_name: study_db
    environment:
      POSTGRES_DB: study_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Cypher001
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-study_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-net

  redis:
    image: redis:7-alpine
    container_name: study_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-net

  api:
    build: ../backend
    container_name: study_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app
      - faiss_data:/app/faiss_data
    networks:
      - app-net

  frontend:
    build: ../frontend
    container_name: study_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - app-net

volumes:
  postgres_data:
  faiss_data:

networks:
  app-net:
    driver: bridge
